<!DOCTYPE html>
<html>
<head>
  <title>Database Kartu Nama</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: Arial; padding:20px; }
    input, select { margin:5px; padding:5px; }
    button { padding:5px 10px; margin:5px; }
    table { border-collapse: collapse; margin-top:20px; width:100%; }
    th, td { border:1px solid #ccc; padding:8px; }
  </style>
</head>
<body>

<h2>Database Kartu Nama Pariwisata</h2>

<!-- FORM -->
<input id="nama_perusahaan" placeholder="Nama Perusahaan">
<input id="nama" placeholder="Nama">
<input id="jabatan" placeholder="Jabatan">
<input id="alamat" placeholder="Alamat">
<input id="kota" placeholder="Wilayah/Kota">
<input id="kategori" placeholder="Kategori">
<input id="telp" placeholder="No Telp/WA">
<input id="medsos" placeholder="Medsos">

<button onclick="saveData()">Simpan</button>

<hr>

<!-- SEARCH & FILTER -->
<input id="searchInput" placeholder="Search Nama..." onkeyup="loadData()">
<input id="filterKota" placeholder="Filter Kota..." onkeyup="loadData()">

<table>
  <thead>
    <tr>
      <th>Perusahaan</th>
      <th>Nama</th>
      <th>Jabatan</th>
      <th>Kota</th>
      <th>Aksi</th>
    </tr>
  </thead>
  <tbody id="dataTable"></tbody>
</table>

<script>
const supabase = window.supabase.createClient(
  "https://xvbzwkbkjfopbkceqsga.supabase.co",
  "sb_publishable_RzqjXOD6Mq5460df3axI2g_jHVk9FuS"
);

let editId = null;

async function saveData() {
  const dataObj = {
    nama_perusahaan: document.getElementById("nama_perusahaan").value,
    nama: document.getElementById("nama").value,
    jabatan: document.getElementById("jabatan").value,
    alamat: document.getElementById("alamat").value,
    kota: document.getElementById("kota").value,
    kategori: document.getElementById("kategori").value,
    telp: document.getElementById("telp").value,
    medsos: document.getElementById("medsos").value
  };

  if(editId){
    await supabase.from("business_cards").update(dataObj).eq("id", editId);
    editId = null;
  } else {
    await supabase.from("business_cards").insert([dataObj]);
  }

  clearForm();
  loadData();
}

async function loadData() {
  const search = document.getElementById("searchInput").value;
  const filterKota = document.getElementById("filterKota").value;

  let query = supabase.from("business_cards").select("*");

  if(search){
    query = query.ilike("nama", `%${search}%`);
  }

  if(filterKota){
    query = query.ilike("kota", `%${filterKota}%`);
  }

  const { data } = await query.order("kota");

  const table = document.getElementById("dataTable");
  table.innerHTML = "";

  data.forEach(item => {
    table.innerHTML += `
      <tr>
        <td>${item.nama_perusahaan}</td>
        <td>${item.nama}</td>
        <td>${item.jabatan}</td>
        <td>${item.kota}</td>
        <td>
          <button onclick="editData(${item.id})">Edit</button>
          <button onclick="deleteData(${item.id})">Delete</button>
        </td>
      </tr>
    `;
  });
}

async function deleteData(id){
  await supabase.from("business_cards").delete().eq("id", id);
  loadData();
}

async function editData(id){
  const { data } = await supabase.from("business_cards").select("*").eq("id", id).single();

  document.getElementById("nama_perusahaan").value = data.nama_perusahaan;
  document.getElementById("nama").value = data.nama;
  document.getElementById("jabatan").value = data.jabatan;
  document.getElementById("alamat").value = data.alamat;
  document.getElementById("kota").value = data.kota;
  document.getElementById("kategori").value = data.kategori;
  document.getElementById("telp").value = data.telp;
  document.getElementById("medsos").value = data.medsos;

  editId = id;
}

function clearForm(){
  document.querySelectorAll("input").forEach(input => input.value = "");
}

loadData();
</script>

</body>
</html>
