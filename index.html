<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Business Card Manager</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-light">

<div class="container py-5">

  <div class="card shadow-lg p-4">
    <h3 class="mb-4 text-center">Business Card Manager</h3>

    <input type="hidden" id="contactId">

    <div class="row g-3">
      <div class="col-md-4">
        <input type="text" id="nama" class="form-control" placeholder="Nama" required>
      </div>
      <div class="col-md-4">
        <input type="text" id="perusahaan" class="form-control" placeholder="Perusahaan">
      </div>
      <div class="col-md-4">
        <input type="text" id="jabatan" class="form-control" placeholder="Jabatan">
      </div>
      <div class="col-md-4">
        <input type="text" id="kota" class="form-control" placeholder="Kota">
      </div>
      <div class="col-md-4">
        <input type="text" id="no_hp" class="form-control" placeholder="No Telp / WhatsApp">
      </div>
      <div class="col-md-4">
        <input type="email" id="email" class="form-control" placeholder="Email">
      </div>
      <div class="col-md-4">
        <input type="text" id="kategori" class="form-control" placeholder="Kategori">
      </div>
    </div>

    <div class="mt-4 text-center">
      <button class="btn btn-primary" onclick="saveContact()">Simpan</button>
    </div>

  </div>

  <div class="card shadow mt-5 p-3">
    <h5>Daftar Kontak</h5>
    <div class="table-responsive">
      <table class="table table-bordered table-striped mt-3">
        <thead class="table-dark">
          <tr>
            <th>Nama</th>
            <th>Perusahaan</th>
            <th>Jabatan</th>
            <th>Kota</th>
            <th>No HP</th>
            <th>Email</th>
            <th>Kategori</th>
            <th>Aksi</th>
          </tr>
        </thead>
        <tbody id="contactTable"></tbody>
      </table>
    </div>
  </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- Custom JS -->
<script src="js/script.js"></script>

</body>
</html>
