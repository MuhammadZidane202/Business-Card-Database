<!DOCTYPE html>
<html>
<head>
  <title>Business Card Manager</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>

<h2>Tambah Kontak</h2>

<form id="contactForm">
  <input type="text" id="nama" placeholder="Nama" required><br>
  <input type="text" id="perusahaan" placeholder="Perusahaan"><br>
  <input type="text" id="jabatan" placeholder="Jabatan"><br>
  <input type="text" id="kota" placeholder="Kota"><br>
  <input type="text" id="no_hp" placeholder="No HP"><br>
  <input type="email" id="email" placeholder="Email"><br>
  <input type="text" id="kategori" placeholder="Kategori"><br>
  <button type="submit">Simpan</button>
</form>

<hr>

<h2>Daftar Kontak</h2>
<input type="text" id="search" placeholder="Search nama...">

<ul id="list"></ul>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyW1dGaCZDnbgLa3q_Mr1cR4vJ7uQrwTI34ZjGxL5zCv2w48RDcr4GuTe2Gk6vKegTm/exec";

async function loadData() {
  const res = await fetch(API_URL);
  const data = await res.json();
  
  const list = document.getElementById("list");
  list.innerHTML = "";

  data.forEach(item => {
    const li = document.createElement("li");
    li.textContent = item.nama + " - " + item.kota;
    list.appendChild(li);
  });
}

document.getElementById("contactForm").addEventListener("submit", async (e)=>{
  e.preventDefault();

  const data = {
    nama: nama.value,
    perusahaan: perusahaan.value,
    jabatan: jabatan.value,
    kota: kota.value,
    no_hp: no_hp.value,
    email: email.value,
    kategori: kategori.value
  };

  await fetch(API_URL, {
    method: "POST",
    body: JSON.stringify(data)
  });

  alert("Data tersimpan!");
  loadData();
});

document.getElementById("search").addEventListener("input", function(){
  const keyword = this.value.toLowerCase();
  const items = document.querySelectorAll("#list li");

  items.forEach(li => {
    li.style.display = li.textContent.toLowerCase().includes(keyword) ? "" : "none";
  });
});

loadData();
</script>

</body>
</html>
