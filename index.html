<!DOCTYPE html>
<html>
<head>
  <title>Business Card Manager</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-light">

<div class="container py-4">

  <h2 class="text-center mb-4">📇 Business Card Manager</h2>

  <div class="card shadow-sm p-3 mb-4">
    <form id="contactForm" class="row g-2">
      <input type="hidden" id="contactId">

      <div class="col-md-4">
        <input type="text" id="nama" class="form-control" placeholder="Nama" required>
      </div>

      <div class="col-md-4">
        <input type="text" id="perusahaan" class="form-control" placeholder="Perusahaan">
      </div>

      <div class="col-md-4">
        <input type="text" id="kota" class="form-control" placeholder="Kota">
      </div>

      <div class="col-12">
        <button class="btn btn-primary">Simpan</button>
        <button type="button" class="btn btn-secondary" onclick="resetForm()">Reset</button>
      </div>
    </form>
  </div>

  <div class="card shadow-sm p-3">
    <input type="text" id="search" class="form-control mb-3" placeholder="Search nama...">
    <table class="table table-bordered">
      <thead>
        <tr>
          <th>Nama</th>
          <th>Perusahaan</th>
          <th>Kota</th>
          <th>Aksi</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

</div>

<script src="js/app.js"></script>
</body>
</html>
